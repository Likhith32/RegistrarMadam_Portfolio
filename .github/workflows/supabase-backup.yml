name: Supabase Weekly Backup

on:
  schedule:
    - cron: "0 4 * * 1"   # Monday 04:00 UTC
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        run: |
          curl -fsSL https://supabase.com/install/linux | sh
          export PATH="$HOME/.supabase/bin:$PATH"
          supabase --version

      - name: Login to Supabase
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          export PATH="$HOME/.supabase/bin:$PATH"
          supabase login --token "$SUPABASE_ACCESS_TOKEN"

      - name: Backup Supabase database
        env:
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          export PATH="$HOME/.supabase/bin:$PATH"
          supabase db dump \
            --project-id "$SUPABASE_PROJECT_ID" \
            --file supabase_backup.sql

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-weekly-backup
          path: supabase_backup.sql
