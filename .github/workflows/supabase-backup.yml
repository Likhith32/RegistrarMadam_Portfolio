name: Supabase Weekly Backup

on:
  schedule:
    - cron: "0 4 * * 1"   # Monday 04:00 UTC
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Supabase CLI (official apt repo)
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates curl gnupg
          sudo install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://packages.supabase.com/gpg.key | sudo gpg --dearmor -o /etc/apt/keyrings/supabase.gpg
          echo "deb [signed-by=/etc/apt/keyrings/supabase.gpg] https://packages.supabase.com/debian stable main" | sudo tee /etc/apt/sources.list.d/supabase.list
          sudo apt-get update
          sudo apt-get install -y supabase
          supabase --version

      - name: Login to Supabase
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase login --token "$SUPABASE_ACCESS_TOKEN"

      - name: Backup Supabase database
        env:
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          supabase db dump \
            --project-id "$SUPABASE_PROJECT_ID" \
            --file supabase_backup.sql

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-weekly-backup
          path: supabase_backup.sql
