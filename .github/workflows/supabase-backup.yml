name: Supabase Weekly Backup

on:
  schedule:
    - cron: "0 4 * * 1"   # Every Monday at 04:00 UTC
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Create database backup (IPv4 + SSL forced)
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          echo "Starting Supabase backup..."
          pg_dump "${DATABASE_URL}?sslmode=require&hostaddr=0.0.0.0" \
            --format=custom \
            --no-owner \
            --no-privileges \
            --verbose \
            > supabase_backup.dump

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-weekly-backup
          path: supabase_backup.dump
