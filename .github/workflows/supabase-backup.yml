name: Supabase Weekly Backup

on:
  schedule:
    - cron: "0 4 * * 1"   # Monday 04:00 UTC
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client dnsutils

      - name: Resolve Supabase IPv4
        id: resolve
        run: |
          IPV4=$(getent ahostsv4 db.zkiqeyhmoipzqawqqrvv.supabase.co | awk '{print $1; exit}')
          echo "SUPABASE_IPV4=$IPV4" >> $GITHUB_ENV
          echo "Resolved IPv4: $IPV4"

      - name: Create database backup (IPv4 + SSL)
        env:
          DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          pg_dump \
            --host="$SUPABASE_IPV4" \
            --port=5432 \
            --username=postgres \
            --dbname=postgres \
            --sslmode=require \
            --format=custom \
            --no-owner \
            --no-privileges \
            --verbose \
            > supabase_backup.dump

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: supabase-weekly-backup
          path: supabase_backup.dump
