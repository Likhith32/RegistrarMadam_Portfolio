name: Supabase Weekly Backup

on:
  schedule:
    - cron: "0 4 * * 1"   # Monday 04:00 UTC
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        run: |
          curl -fsSL https://supabase.com/install/linux | sh
          echo "$HOME/.supabase/bin" >> $GITHUB_PATH

      - name: Authenticate Supabase
        run: |
          supabase login --token ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Backup Supabase database
        run: |
          supabase db dump \
            --project-id ${{ secrets.SUPABASE_PROJECT_ID }} \
            --file supabase_backup.sql

      - name: Upload backup
        uses: actions/upload-artifact@v4
        with:
          name: supabase-weekly-backup
          path: supabase_backup.sql
